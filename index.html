<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06283d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SafeBoat — Sitonija</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main id="map" aria-label="Mapa Sitonije"></main>

  <header class="panel header-panel">
    <div>
      <strong class="brand">⚓ SafeBoat</strong>
      <span class="subtitle">Sitonija · v0.4.1</span>
    </div>
    <span id="gps-state" class="status" aria-live="polite"><i></i> GPS nije aktivan</span>
  </header>

  <section class="panel controls" aria-label="Kontrole navigacije">
    <button id="locate" class="primary" type="button">◎ Moja lokacija</button>
    <button id="return-home" type="button" disabled>↩ Povratak na početnu tačku</button>
  </section>

  <aside class="panel telemetry" aria-label="GPS podaci">
    <div><b id="speed">0.0</b><span>čvorova</span></div>
    <div><b id="course">—</b><span>kurs</span></div>
    <div><b id="accuracy">—</b><span>preciznost</span></div>
    <div><b id="distance">0.00</b><span>NM do početka</span></div>
  </aside>

  <div id="message" class="message" role="status" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/map.js"></script>
  <script src="js/gps.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
